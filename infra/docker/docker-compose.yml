services:
  postgres:
    image: postgres:16-alpine
    container_name: gms-svn-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: gms_svn
      POSTGRES_PASSWORD: gms_svn_dev
      POSTGRES_DB: gms_svn
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gms_svn -d gms_svn"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: gms-svn-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  redis_data:
